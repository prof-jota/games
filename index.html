<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🎮 Arcade Web</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <div class="arcade">


        <!-- =====================================
         CABEÇALHO
    ====================================== -->

        <header class="header">

            <div class="logo">

                🎮 ARCADE WEB

            </div>


            <div class="pesquisa">

                🔍

                <input type="text" id="campoPesquisa" placeholder="Pesquisar">

            </div>


            <!-- Mude isso na sua div class="usuario" -->
            <div class="usuario">
                <span>🌙</span>
                👤 <input type="text" id="nomeUsuario" value="Djonatan" class="input-nome"
                    title="Clique para mudar seu nome">
            </div>


        </header>




        <!-- =====================================
         MENU PRINCIPAL
    ====================================== -->

        <main id="menu">


            <!-- DESTAQUE -->

            <section class="destaque">


                <div class="titulo-area">

                    <h2>

                        ⭐ Destaque da Semana

                    </h2>


                    <span>

                        ▶

                    </span>


                </div>



                <div class="banner">


                    <h1>

                        🏓 PONG

                    </h1>


                    <p>

                        "Desafie seus colegas!"

                    </p>



                    <button class="btn-jogar" data-game="pong">

                        JOGAR AGORA

                    </button>


                </div>


            </section>





            <!-- LISTA DE JOGOS -->


            <section class="jogos">


                <h2>

                    Jogos Disponíveis

                </h2>



                <div id="listaJogos" class="lista-jogos">


                    <!--
                    Os jogos serão criados
                    automaticamente pelo JavaScript
                -->


                </div>


            </section>





            <!-- PAINEL INFERIOR -->


            <section class="painel">


                <div class="ranking">


                    <h2>

                        🏆 Ranking

                    </h2>


                    <p>

                        1º Djonatan - 9800

                    </p>


                    <p>

                        2º Maria - 8500

                    </p>


                    <p>

                        3º João - 7200

                    </p>


                </div>





                <div class="estatisticas">


                    <h2>

                        🎯 Estatísticas

                    </h2>


                    <p>

                        Jogos instalados: 8

                    </p>


                    <p>

                        Partidas: 120

                    </p>


                    <p>

                        Sistema: ONLINE

                    </p>


                </div>



            </section>



        </main>






        <!-- =====================================
         ÁREA DOS JOGOS
    ====================================== -->


        <section id="gameScreen" class="game-screen">


            <div class="game-header">


                <button id="btnVoltar">

                    ← VOLTAR

                </button>
                <button id="btnRestart"
                    style="display: none; background: #ffaa00; color: #000; margin-left: 10px; font-weight: bold;">
                    🔄 REINICIAR
                </button>



                <h2 id="tituloJogo">

                    JOGO

                </h2>



            </div>



            <canvas id="gameCanvas" width="900" height="500">

            </canvas>



        </section>






        <!-- =====================================
         RODAPÉ
    ====================================== -->


        <footer>


            ARCADE WEB SYSTEM © 2026


        </footer>



    </div>





    <!-- Scripts -->

    <script src="jogos.js"></script>
    <script src="pong.js"></script>
    <script src="snake.js"></script>
    <script src="memoria.js"></script>
    <script src="tetris.js"></script>
    <script src="invaders.js"></script>
    <script src="flappy.js"></script>
    <script src="velha.js"></script>
    <script src="quiz.js"></script>
    <script src="engine.js"></script>

    <script src="main.js"></script>


</body>

</html>
